services:
  # 스프링 부트 앱 추가
  springboot:
    build: .             # 현재 폴더의 Dockerfile을 읽어서 빌드하라는 의미
    container_name: local-springboot
    restart: always
    ports:
      - "8080:8080"      # 스프링 부트 기본 포트 (필요시 변경)
    env_file:
      - .env             # 스프링 부트에서 사용할 환경변수 파일
    depends_on:          # DB와 Redis가 먼저 켜진 후에 실행되도록 보장
      - postgres
      - redis
    networks:
      - web

  postgres:
    image: postgres:15
    container_name: local-postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - web

  redis:
    image: redis:7.2
    container_name: diet-redis
    env_file:
      - .env
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks: [ web ]

networks:
  web:
    driver: bridge

volumes:
  postgres_data:
  redis_data: